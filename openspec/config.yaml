schema: spec-driven

# Contexto del proyecto — usado por asistentes al generar artefactos.
context: |
  Stack tecnológico: TypeScript, Preact, Vite, Node.js
  Frameworks/librerías: Preact (UI), Vite (build), vite-plugin-pwa
  Herramientas: scripts de Node.js en `scripts/`, scaffolding en `tooling/create-miniapp`
  Convenciones:
    - Miniapps viven en `apps/*` con `app.config.json` como contrato de metadatos.
    - El registro de apps se genera en `apps/home/src/generated/apps-registry.ts`.
    - Usamos Conventional Commits para mensajes de commit.
    - Tests usan Vitest cuando existen en un subproyecto.
  Dominio: Colección de miniapps PWA estáticas orientadas a despliegue en GitHub Pages.

# Reglas por artefacto — guían la creación de artefactos OpenSpec.
rules:
  proposal:
    - Mantener propuestas por debajo de 500 palabras
    - Incluir siempre una sección "Non-goals"
    - Incluir una sección "Evidencia" con rutas relativas del workspace al afirmar comportamiento implementado
  spec:
    - Mantener resúmenes de spec concisos (máx 300 palabras)
    - Incluir una sección "Evidencia" listando rutas de archivo o artefactos generados que prueben la implementación
    - Preferir enlazar a archivos bajo `apps/`, `scripts/` o `tooling/` para verificación
  tasks:
    - Dividir tareas en trozos de máximo 2 horas
    - Cada tarea debe ser accionable y verificable
  change:
    - Al marcar un cambio como implementado, incluir enlaces de prueba y rutas de archivos generados

