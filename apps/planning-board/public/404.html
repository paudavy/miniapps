<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Planning Board - redirect</title>
    <script>
      (function () {
        const slug = 'planning-board';
        const marker = '/' + slug + '/';
        const idx = location.pathname.lastIndexOf(marker);
        const base =
          idx !== -1 ? location.pathname.slice(0, idx + marker.length) : marker;
        const path =
          idx !== -1
            ? location.pathname.slice(idx + marker.length)
            : location.pathname.replace(marker, '');
        const query = location.search || '';
        location.replace(
          base +
            '?redirect=' +
            encodeURIComponent('/' + path + query + location.hash),
        );
      })();
    </script>
  </head>
  <body></body>
</html>
